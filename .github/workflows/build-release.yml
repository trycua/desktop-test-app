name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: desktop-test-app-linux-x86_64
            ext: ""
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: desktop-test-app-macos-arm64
            ext: ""
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact: desktop-test-app-macos-x86_64
            ext: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: desktop-test-app-windows-x86_64
            ext: ".exe"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libx11-dev \
            libxcb1-dev \
            libxrandr-dev \
            libdbus-1-dev \
            libssl-dev \
            pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build
        run: tauri build --target ${{ matrix.target }} --ci
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      # ── Collect the binary/bundle ──────────────────────────────────────

      - name: Collect artifact (Linux binary + .deb)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          # AppImage — self-contained, no install needed
          APPIMAGE=$(find src-tauri/target/${{ matrix.target }}/release/bundle/appimage -name "*.AppImage" | head -1)
          cp "$APPIMAGE" "${{ matrix.artifact }}.AppImage"
          # .deb — for dpkg -i install in sandbox tests
          DEB=$(find src-tauri/target/${{ matrix.target }}/release/bundle/deb -name "*.deb" | head -1)
          cp "$DEB" "desktop-test-app_amd64.deb"

      - name: Collect artifact (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          cp src-tauri/target/${{ matrix.target }}/release/desktop-test-app \
             ${{ matrix.artifact }}

      - name: Collect artifact (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          Copy-Item "src-tauri/target/${{ matrix.target }}/release/desktop-test-app.exe" `
                    "${{ matrix.artifact }}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'ubuntu-latest'
        with:
          name: ${{ matrix.artifact }}-appimage
          path: ${{ matrix.artifact }}.AppImage
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'ubuntu-latest'
        with:
          name: desktop-test-app-deb
          path: desktop-test-app_amd64.deb
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        if: "!startsWith(matrix.platform, 'ubuntu')"
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
